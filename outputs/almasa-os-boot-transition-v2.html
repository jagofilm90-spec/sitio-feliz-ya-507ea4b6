<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMASA-OS · Boot Transition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #1a1a1f;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter Tight', sans-serif;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ═══ FASE 1: Logo Corporativo ═══ */
  .corporate-logo-group {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: corporateFadeIn 0.8s ease-out 0.3s forwards,
               corporateHold 0.7s ease 1.1s forwards,
               corporateDissolve 0.8s ease-in 1.8s forwards;
  }

  .corporate-logo {
    width: 280px;
    height: auto;
    filter: brightness(1);
  }

  .corporate-sub {
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }

  .corporate-since {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    font-style: italic;
    color: rgba(255,255,255,0.2);
    margin-top: -8px;
  }

  @keyframes corporateFadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes corporateHold {
    from { opacity: 1; }
    to   { opacity: 1; }
  }
  @keyframes corporateDissolve {
    to {
      opacity: 0;
      filter: blur(15px);
      transform: scale(1.1);
    }
  }

  /* ═══ FASE 2: Partículas Crimson ═══ */
  .particles-container {
    position: absolute;
    width: 0;
    height: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #c41e3a;
    opacity: 0;
    animation: particleBurst 0.9s ease-out 2.0s forwards;
  }

  @keyframes particleBurst {
    0%   { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: var(--particle-end) scale(0.3); }
  }

  /* ═══ FASE 3: La Huella ═══ */
  .huella-group {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    opacity: 0;
    animation: huellaAppear 0.01s linear 2.6s forwards;
  }

  @keyframes huellaAppear {
    to { opacity: 1; }
  }

  .huella-glow {
    position: absolute;
    width: 200px;
    height: 200px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    background: radial-gradient(circle, rgba(196,30,58,0.15) 0%, transparent 70%);
    filter: blur(30px);
    opacity: 0;
    animation: glowIn 1s ease-out 2.7s forwards;
  }

  @keyframes glowIn {
    to { opacity: 1; }
  }

  .huella-svg {
    position: relative;
    z-index: 2;
  }

  /* Dot bounce */
  .boot-dot {
    transform-origin: center;
    transform: scale(0);
    animation: dotBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 2.7s forwards;
  }

  @keyframes dotBounce {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* Arc draw animations using stroke-dasharray */
  .boot-arc-3 {
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: drawArc 0.5s ease-out 2.9s forwards;
  }
  .boot-arc-2 {
    stroke-dasharray: 350;
    stroke-dashoffset: 350;
    animation: drawArc2 0.5s ease-out 3.15s forwards;
  }
  .boot-arc-1 {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: drawArc3 0.5s ease-out 3.4s forwards;
  }

  @keyframes drawArc {
    to { stroke-dashoffset: 0; }
  }
  @keyframes drawArc2 {
    to { stroke-dashoffset: 0; }
  }
  @keyframes drawArc3 {
    to { stroke-dashoffset: 0; }
  }

  /* ALMASA text */
  .huella-almasa {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.12em;
    margin-top: 12px;
    opacity: 0;
    transform: translateY(12px);
    animation: slideUp 0.5s ease-out 3.7s forwards;
  }

  /* SISTEMA · 1904 */
  .huella-sistema {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: #c41e3a;
    text-transform: uppercase;
    font-weight: 500;
    margin-top: 6px;
    opacity: 0;
    transform: translateY(8px);
    animation: slideUp 0.4s ease-out 3.9s forwards;
  }

  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ═══ FASE 4: Fade Out ═══ */
  .stage.fadeout .huella-group,
  .stage.fadeout .huella-glow,
  .stage.fadeout .particles-container {
    animation: finalFadeOut 1s ease-in forwards !important;
  }
  .stage.fadeout .huella-group * {
    animation-play-state: paused !important;
  }

  @keyframes finalFadeOut {
    to { opacity: 0; }
  }

  /* ═══ Progress Bar ═══ */
  .progress-area {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }

  .progress-track {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    width: 0%;
    height: 100%;
    background: #c41e3a;
    border-radius: 1px;
    animation: progressGrow 5s ease-in-out 0.2s forwards;
  }

  @keyframes progressGrow {
    0%   { width: 0%; }
    20%  { width: 15%; }
    40%  { width: 35%; }
    60%  { width: 55%; }
    80%  { width: 80%; }
    95%  { width: 95%; }
    100% { width: 100%; }
  }

  .progress-label {
    font-family: 'Inter Tight', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    min-width: 200px;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* ═══ Replay Button ═══ */
  .replay-btn {
    position: fixed;
    bottom: 20px;
    right: 24px;
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.25);
    font-family: 'Inter Tight', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 20;
    transition: all 0.2s;
    opacity: 0;
    animation: replayAppear 0.3s ease 5.5s forwards;
  }

  .replay-btn:hover {
    border-color: #c41e3a;
    color: #c41e3a;
  }

  @keyframes replayAppear {
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- FASE 1: Corporate Logo -->
  <div class="corporate-logo-group" id="corpLogo">
    <img class="corporate-logo" id="corpImg" alt="ALMASA" />
    <div class="corporate-sub">Abarrotes La Manita, S.A. de C.V.</div>
    <div class="corporate-since">Desde 1904</div>
  </div>

  <!-- FASE 2: Particles -->
  <div class="particles-container" id="particles"></div>

  <!-- FASE 3: Huella Glow -->
  <div class="huella-glow" id="huellaGlow"></div>

  <!-- FASE 3: La Huella -->
  <div class="huella-group" id="huellaGroup">
    <svg class="huella-svg" width="100" height="90" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#c41e3a" stroke-width="9" stroke-linecap="round" fill="none">
        <path d="M 20 160 C 35 5, 165 5, 180 160" class="boot-arc-1" />
        <path d="M 50 160 C 62 38, 138 38, 150 160" class="boot-arc-2" />
        <path d="M 80 160 C 88 75, 112 75, 120 160" class="boot-arc-3" />
      </g>
      <circle cx="100" cy="125" r="6" fill="#c41e3a" class="boot-dot" />
    </svg>
    <div class="huella-almasa">ALMASA</div>
    <div class="huella-sistema">Sistema &middot; 1904</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-area" id="progressArea">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <div class="progress-label" id="progressLabel">Cargando sistema</div>
</div>

<!-- Replay -->
<button class="replay-btn" id="replayBtn">&#x21bb; Replay</button>

      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (360 / NUM_PARTICLES) * i + (Math.random() * 15 - 7.5);
      const dist = 40 + Math.random() * 80;
      const rad = angle * Math.PI / 180;
      const tx = Math.cos(rad) * dist;
      const ty = Math.sin(rad) * dist;
      p.style.setProperty('--particle-end', `translate(${tx}px, ${ty}px)`);
      p.style.animationDelay = `${2.0 + Math.random() * 0.15}s`;
      p.style.animationDuration = `${0.6 + Math.random() * 0.4}s`;
      p.style.width = `${2 + Math.random() * 2}px`;
      p.style.height = p.style.width;
      newParticles.appendChild(p);
    }
    stage.appendChild(newParticles);

    // Glow
    const glow = document.createElement('div');
    glow.className = 'huella-glow';
    glow.id = 'huellaGlow';
    stage.appendChild(glow);

    // Huella group
    const hg = document.createElement('div');
    hg.className = 'huella-group';
    hg.id = 'huellaGroup';
    hg.innerHTML = `
      <svg class="huella-svg" width="100" height="90" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#c41e3a" stroke-width="9" stroke-linecap="round" fill="none">
          <path d="M 20 160 C 35 5, 165 5, 180 160" class="boot-arc-1" />
          <path d="M 50 160 C 62 38, 138 38, 150 160" class="boot-arc-2" />
          <path d="M 80 160 C 88 75, 112 75, 120 160" class="boot-arc-3" />
        </g>
        <circle cx="100" cy="125" r="6" fill="#c41e3a" class="boot-dot" />
      </svg>
      <div class="huella-almasa">ALMASA</div>
      <div class="huella-sistema">Sistema &middot; 1904</div>
    `;
    stage.appendChild(hg);

    // Reset progress
    progressFill.style.animation = 'none';
    progressFill.offsetHeight; // reflow
    progressFill.style.animation = 'progressGrow 5s ease-in-out 0.2s forwards';
    
    progressLabel.textContent = 'Cargando sistema';
    
    // Reset replay button
    replayBtn.style.animation = 'none';
    replayBtn.offsetHeight;
    replayBtn.style.animation = 'replayAppear 0.3s ease 5.5s forwards';
    replayBtn.style.opacity = '0';

    runLabels();
  });
</script>
</body>
</html>
