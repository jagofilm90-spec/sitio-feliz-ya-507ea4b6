<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMASA-OS · Boot Transition v3</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;width:100vw;height:100vh;overflow:hidden;font-family:'Inter Tight',sans-serif}
.stage{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}

#corpGroup{position:absolute;display:flex;flex-direction:column;align-items:center;opacity:0}
#corpImg{width:320px;height:auto;will-change:transform,opacity,filter}

#fragmentsCanvas{position:absolute;top:0;left:0;width:100vw;height:100vh;pointer-events:none}

#huellaGroup{position:absolute;display:flex;flex-direction:column;align-items:center;opacity:0;pointer-events:none}
.huella-glow{position:absolute;width:260px;height:260px;top:50%;left:50%;transform:translate(-50%,-55%);background:radial-gradient(circle,rgba(196,30,58,.12) 0%,transparent 70%);filter:blur(35px);opacity:0;transition:opacity 1s}
.huella-glow.show{opacity:1}

#pulseRing{position:absolute;width:20px;height:20px;border:2px solid #c41e3a;border-radius:50%;opacity:0;pointer-events:none}

.boot-arc-1,.boot-arc-2,.boot-arc-3{stroke-dasharray:500;stroke-dashoffset:500}
.boot-dot{transform-origin:100px 125px;transform:scale(0)}

@keyframes huellaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.huella-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:600;color:#c41e3a;letter-spacing:.14em;margin-top:14px;opacity:0;transform:translateY(14px);transition:opacity .6s,transform .6s}
.huella-title.show{opacity:1;transform:translateY(0)}

.huella-sub{font-family:'Inter Tight',sans-serif;font-size:10px;letter-spacing:.18em;color:#a8a8ae;text-transform:uppercase;font-weight:500;margin-top:7px;opacity:0;transform:translateY(8px);transition:opacity .5s .12s,transform .5s .12s}
.huella-sub.show{opacity:1;transform:translateY(0)}

.replay-btn{position:fixed;bottom:20px;right:24px;background:none;border:1px solid rgba(0,0,0,.1);color:#a8a8ae;font-family:'Inter Tight',sans-serif;font-size:11px;letter-spacing:.1em;padding:6px 14px;border-radius:6px;cursor:pointer;z-index:20;transition:all .2s;opacity:0}
.replay-btn.show{opacity:1}
.replay-btn:hover{border-color:#c41e3a;color:#c41e3a}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div id="corpGroup">
    <img id="corpImg" alt="ALMASA" />
  </div>
  <canvas id="fragmentsCanvas"></canvas>
  <div id="huellaGroup">
    <div class="huella-glow" id="huellaGlow"></div>
    <svg id="huellaSvg" width="110" height="99" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g stroke="#c41e3a" stroke-width="9" stroke-linecap="round" fill="none">
        <path d="M 20 160 C 35 5, 165 5, 180 160" class="boot-arc-1" id="arc1"/>
        <path d="M 50 160 C 62 38, 138 38, 150 160" class="boot-arc-2" id="arc2"/>
        <path d="M 80 160 C 88 75, 112 75, 120 160" class="boot-arc-3" id="arc3"/>
      </g>
      <circle cx="100" cy="125" r="6" fill="#c41e3a" class="boot-dot" id="bootDot"/>
    </svg>
    <div class="huella-title" id="huellaTitle">ALMASA</div>
    <div class="huella-sub" id="huellaSub">Sistema &middot; 1904</div>
  </div>
  <div id="pulseRing"></div>
</div>

<button class="replay-btn" id="replayBtn">&#x21bb; Replay</button>

class BootAnimation {
  constructor() {
    this.fragments = [];
    this.canvas = document.getElementById('fragmentsCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.running = false;
    this.setupCanvas();
  }

  setupCanvas() {
    this.canvas.width = window.innerWidth * devicePixelRatio;
    this.canvas.height = window.innerHeight * devicePixelRatio;
    this.canvas.style.width = window.innerWidth + 'px';
    this.canvas.style.height = window.innerHeight + 'px';
    this.ctx.scale(devicePixelRatio, devicePixelRatio);
  }

  async extractFragments() {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const oc = document.createElement('canvas');
        const displayW = 320;
        const displayH = Math.round(displayW * (img.naturalHeight / img.naturalWidth));
        oc.width = displayW;
        oc.height = displayH;
        const octx = oc.getContext('2d');
        octx.drawImage(img, 0, 0, displayW, displayH);
        const imageData = octx.getImageData(0, 0, displayW, displayH);

        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const startX = cx - displayW / 2;
        const startY = cy - displayH / 2;
        const frags = [];
        const sizes = [6, 8, 10];

        for (let fy = 0; fy < displayH;) {
          const BLOCK = sizes[Math.floor(Math.random() * sizes.length)];
          for (let fx = 0; fx < displayW;) {
            const bSz = sizes[Math.floor(Math.random() * sizes.length)];
            const bw = Math.min(bSz, displayW - fx);
            const bh = Math.min(BLOCK, displayH - fy);
            let hasContent = false;
            for (let py = 0; py < bh && !hasContent; py++) {
              for (let px = 0; px < bw && !hasContent; px++) {
                const idx = ((fy + py) * displayW + (fx + px)) * 4;
                if (imageData.data[idx + 3] > 30) hasContent = true;
              }
            }
            if (hasContent) {
              const blockCanvas = document.createElement('canvas');
              blockCanvas.width = bw;
              blockCanvas.height = bh;
              const bctx = blockCanvas.getContext('2d');
              bctx.drawImage(oc, fx, fy, bw, bh, 0, 0, bw, bh);

              const worldX = startX + fx;
              const worldY = startY + fy;
              const angle = Math.random() * Math.PI * 2;
              const dist = 60 + Math.random() * 140;
              const scatterX = cx + Math.cos(angle) * dist - bw / 2;
              const scatterY = cy + Math.sin(angle) * dist - bh / 2;

              frags.push({
                canvas: blockCanvas, w: bw, h: bh,
                sx: worldX, sy: worldY,
                x: worldX, y: worldY,
                scatterX, scatterY,
                rot: 0,
                maxRot: (Math.random() - 0.5) * Math.PI * 0.8,
                opacity: 1, scale: 1,
                delay: Math.random() * 0.25,
                speed: 0.8 + Math.random() * 0.4,
                tint: 0,
              });
            }
            fx += bSz;
          }
          fy += sizes[Math.floor(Math.random() * sizes.length)];
        }
        this.fragments = frags;
        resolve();
      };
      img.src = 'data:image/png;base64,' + CORP_B64;
    });
  }

  easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  easeOutQuint(t) { return 1 - Math.pow(1-t,5); }
  easeInQuad(t) { return t*t; }
  easeOutBack(t) { const c1=1.70158; const c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

  // ═══ PHASE 1: Slow fade in of corporate logo (0–2.5s) ═══
  async phase1() {
    const corpGroup = document.getElementById('corpGroup');
    const corpImg = document.getElementById('corpImg');
    corpImg.src = 'data:image/png;base64,' + CORP_B64;

    const dur = 1000;
    const start = performance.now();
    await new Promise(resolve => {
      const tick = (now) => {
        const t = Math.min((now - start) / dur, 1);
        const e = this.easeInOutCubic(t);
        corpGroup.style.opacity = e;
        corpGroup.style.transform = `scale(${0.96 + 0.04 * e})`;
        if (t < 1) requestAnimationFrame(tick); else resolve();
      };
      requestAnimationFrame(tick);
    });
    await this.wait(1500);
  }

  // ═══ PHASE 2: Explode → pause → reassemble as Huella (2.5–4.5s) ═══
  async phase2() {
    const corpGroup = document.getElementById('corpGroup');
    await this.extractFragments();
    corpGroup.style.transition = 'opacity 0.01s';
    corpGroup.style.opacity = '0';

    // Sub-phase A: Scatter outward (0.8s)
    const scatterDur = 800;
    const start1 = performance.now();
    await new Promise(resolve => {
      const tick = (now) => {
        const elapsed = (now - start1) / 1000;
        this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        let allDone = true;
        for (const f of this.fragments) {
          const localT = Math.max(0, elapsed - f.delay);
          const progress = Math.min(localT / (scatterDur / 1000 * f.speed), 1);
          if (progress < 1) allDone = false;
          const e = this.easeOutQuint(progress);
          f.x = f.sx + (f.scatterX - f.sx) * e;
          f.y = f.sy + (f.scatterY - f.sy) * e;
          f.rot = f.maxRot * e;
          f.opacity = 1;
          f.scale = 1;
          this.ctx.save();
          this.ctx.globalAlpha = 1;
          this.ctx.translate(f.x + f.w/2, f.y + f.h/2);
          this.ctx.rotate(f.rot);
          this.ctx.drawImage(f.canvas, -f.w/2, -f.h/2, f.w, f.h);
          this.ctx.restore();
        }
        if (!allDone) requestAnimationFrame(tick); else resolve();
      };
      requestAnimationFrame(tick);
    });

    // Redraw scattered state
    this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (const f of this.fragments) {
      this.ctx.save();
      this.ctx.translate(f.x + f.w/2, f.y + f.h/2);
      this.ctx.rotate(f.rot);
      this.ctx.drawImage(f.canvas, -f.w/2, -f.h/2, f.w, f.h);
      this.ctx.restore();
    }

    // Sub-phase B: Pause (0.3s)
    await this.wait(300);

    // Sub-phase C: Converge to center + tint crimson + fade out (1.0s)
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const convergeDur = 1000;
    const start2 = performance.now();
    await new Promise(resolve => {
      const tick = (now) => {
        const elapsed = (now - start2) / 1000;
        this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        let allDone = true;
        for (const f of this.fragments) {
          const localT = Math.max(0, elapsed - f.delay * 0.5);
          const progress = Math.min(localT / (convergeDur / 1000 * f.speed), 1);
          if (progress < 1) allDone = false;
          const e = this.easeInOutCubic(progress);
          // Move from scattered position to center
          const targetX = cx - f.w/2;
          const targetY = cy - f.h/2;
          f.x = f.scatterX + (targetX - f.scatterX) * e;
          f.y = f.scatterY + (targetY - f.scatterY) * e;
          f.rot = f.maxRot * (1 - e);
          f.scale = 1 - progress * 0.3;
          f.opacity = Math.max(0, 1 - Math.pow(progress, 1.5));
          f.tint = e;

          if (f.opacity < 0.01) continue;
          this.ctx.save();
          this.ctx.globalAlpha = f.opacity;
          this.ctx.translate(f.x + f.w/2, f.y + f.h/2);
          this.ctx.rotate(f.rot);
          this.ctx.scale(f.scale, f.scale);
          this.ctx.drawImage(f.canvas, -f.w/2, -f.h/2, f.w, f.h);
          // Crimson tint overlay
          if (f.tint > 0.1) {
            this.ctx.globalCompositeOperation = 'source-atop';
            this.ctx.fillStyle = `rgba(196,30,58,${f.tint * 0.6})`;
            this.ctx.fillRect(-f.w/2, -f.h/2, f.w, f.h);
          }
          this.ctx.restore();
        }
        if (!allDone) requestAnimationFrame(tick);
        else { this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight); resolve(); }
      };
      requestAnimationFrame(tick);
    });
  }

  // ═══ PHASE 3: La Huella birth (4.5–6s) ═══
  async phase3() {
    const huellaGroup = document.getElementById('huellaGroup');
    const dot = document.getElementById('bootDot');
    const arc3 = document.getElementById('arc3');
    const arc2 = document.getElementById('arc2');
    const arc1 = document.getElementById('arc1');
    const glow = document.getElementById('huellaGlow');
    const svg = document.getElementById('huellaSvg');

    huellaGroup.style.opacity = '1';
    await this.pulseRing();

    // Dot bounce
    const dotDur = 500;
    const dotStart = performance.now();
    await new Promise(resolve => {
      const tick = (now) => {
        const t = Math.min((now - dotStart) / dotDur, 1);
        const e = this.easeOutBack(t);
        dot.style.transform = `scale(${e})`;
        dot.style.transformOrigin = '100px 125px';
        if (t < 1) requestAnimationFrame(tick); else resolve();
      };
      requestAnimationFrame(tick);
    });

    glow.classList.add('show');

    const drawArc = async (el, len, dur = 500) => {
      const start = performance.now();
      await new Promise(resolve => {
        const tick = (now) => {
          const t = Math.min((now - start) / dur, 1);
          const e = this.easeOutQuint(t);
          el.style.strokeDashoffset = len * (1 - e);
          if (t < 1) requestAnimationFrame(tick); else resolve();
        };
        requestAnimationFrame(tick);
      });
    };

    await drawArc(arc3, 200, 450);
    await this.wait(100);
    await drawArc(arc2, 350, 450);
    await this.wait(100);
    await drawArc(arc1, 500, 500);

    svg.style.animation = 'huellaPulse 1s ease-in-out 2';

    await this.wait(200);
    document.getElementById('huellaTitle').classList.add('show');
    await this.wait(250);
    document.getElementById('huellaSub').classList.add('show');
    await this.wait(1200);
  }

  // ═══ PHASE 4: Fade out (6–7s) ═══
  async phase4() {
    const huellaGroup = document.getElementById('huellaGroup');
    const glow = document.getElementById('huellaGlow');
    huellaGroup.style.transition = 'opacity 1s ease-in';
    huellaGroup.style.opacity = '0';
    glow.style.transition = 'opacity 1s ease-in';
    glow.style.opacity = '0';
    await this.wait(1200);
  }

  async pulseRing() {
    const ring = document.getElementById('pulseRing');
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    ring.style.left = cx - 10 + 'px';
    ring.style.top = cy - 14 + 'px';
    const dur = 700;
    const start = performance.now();
    await new Promise(resolve => {
      const tick = (now) => {
        const t = Math.min((now - start) / dur, 1);
        const scale = 1 + t * 8;
        ring.style.opacity = String(1 - t);
        ring.style.transform = `scale(${scale})`;
        if (t < 1) requestAnimationFrame(tick); else { ring.style.opacity = '0'; resolve(); }
      };
      requestAnimationFrame(tick);
    });
  }

  wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  reset() {
    this.fragments = [];
    const corpGroup = document.getElementById('corpGroup');
    const huellaGroup = document.getElementById('huellaGroup');
    const glow = document.getElementById('huellaGlow');
    const dot = document.getElementById('bootDot');
    const arc1 = document.getElementById('arc1');
    const arc2 = document.getElementById('arc2');
    const arc3 = document.getElementById('arc3');
    const svg = document.getElementById('huellaSvg');
    const ring = document.getElementById('pulseRing');

    corpGroup.style.opacity = '0';
    corpGroup.style.transition = 'none';
    corpGroup.style.transform = 'scale(0.96)';
    huellaGroup.style.opacity = '0';
    huellaGroup.style.transition = 'none';
    glow.classList.remove('show');
    glow.style.transition = 'none';
    glow.style.opacity = '0';
    dot.style.transform = 'scale(0)';
    dot.style.transformOrigin = '100px 125px';
    arc1.style.strokeDashoffset = '500';
    arc2.style.strokeDashoffset = '350';
    arc3.style.strokeDashoffset = '200';
    svg.style.animation = 'none';
    document.getElementById('huellaTitle').classList.remove('show');
    document.getElementById('huellaSub').classList.remove('show');
    ring.style.opacity = '0';
    document.getElementById('replayBtn').classList.remove('show');
    this.ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  }

  async run() {
    if (this.running) return;
    this.running = true;
    this.reset();
    await this.wait(300);
    await this.phase1();
    await this.phase2();
    await this.phase3();
    await this.phase4();
    document.getElementById('replayBtn').classList.add('show');
    this.running = false;
  }
}

const boot = new BootAnimation();
window.addEventListener('resize', () => boot.setupCanvas());
document.getElementById('replayBtn').addEventListener('click', () => boot.run());
boot.run();
</script>
</body>
